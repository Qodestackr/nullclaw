name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: nullclaw/nullbuilder/.github/workflows/zig-release.yml@v1
    permissions:
      contents: write
      packages: write
    secrets: inherit
    with:
      binary_name: nullclaw
      artifact_prefix: nullclaw
      source_archive: true
      source_archive_name: nullclaw-source-${{ github.ref_name }}.tar.gz
      source_archive_excludes: |
        .git
        .zig-cache
        zig-out
      publish_docker: true
